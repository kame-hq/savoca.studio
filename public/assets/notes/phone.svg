<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#1B1B17" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Base -->
  <ellipse cx="100" cy="170" rx="48" ry="9" />
  <ellipse cx="100" cy="166" rx="48" ry="9" />
  <line x1="52" y1="166" x2="52" y2="170" />
  <line x1="148" y1="166" x2="148" y2="170" />
  <!-- Stem -->
  <line x1="92" y1="166" x2="92" y2="78" />
  <line x1="108" y1="166" x2="108" y2="78" />
  <!-- Mouthpiece cup -->
  <path d="M 78 78 Q 100 60 122 78" />
  <ellipse cx="100" cy="78" rx="22" ry="6" />
  <ellipse cx="100" cy="74" rx="22" ry="6" />
  <!-- Hook arm extending to receiver -->
  <path d="M 100 70 Q 130 50 152 56" />
  <line x1="148" y1="58" x2="156" y2="54" />
  <!-- Receiver hanging on hook -->
  <ellipse cx="156" cy="62" rx="14" ry="6" transform="rotate(-20 156 62)" />
  <ellipse cx="156" cy="62" rx="14" ry="6" transform="rotate(-20 156 62)" stroke-dasharray="1 2" />
  <!-- Cord -->
  <path d="M 152 68 Q 140 90 130 110 Q 120 130 110 145" stroke-dasharray="3 2.5" />
  <!-- Cross-hatching on stem for shading -->
  <line x1="93" y1="100" x2="107" y2="100" stroke-width="0.6" />
  <line x1="93" y1="110" x2="107" y2="110" stroke-width="0.6" />
  <line x1="93" y1="120" x2="107" y2="120" stroke-width="0.6" />
  <line x1="93" y1="130" x2="107" y2="130" stroke-width="0.6" />
  <line x1="93" y1="140" x2="107" y2="140" stroke-width="0.6" />
  <line x1="93" y1="150" x2="107" y2="150" stroke-width="0.6" />
  <!-- Stipple on base -->
  <circle cx="80" cy="167" r="0.7" fill="#1B1B17" stroke="none" />
  <circle cx="100" cy="168" r="0.7" fill="#1B1B17" stroke="none" />
  <circle cx="120" cy="167" r="0.7" fill="#1B1B17" stroke="none" />
  <circle cx="65" cy="168" r="0.5" fill="#1B1B17" stroke="none" />
  <circle cx="135" cy="168" r="0.5" fill="#1B1B17" stroke="none" />
</svg>
