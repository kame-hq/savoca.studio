<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#1B1B17" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Magnifying glass over a funnel — auditing the leaks -->
  <!-- Funnel body -->
  <path d="M 50 60 L 150 60 L 115 110 L 115 150 L 85 150 L 85 110 Z" />
  <!-- Funnel opening lines -->
  <line x1="60" y1="68" x2="140" y2="68" stroke-width="0.6" />
  <line x1="70" y1="76" x2="130" y2="76" stroke-width="0.6" />
  <!-- Drop falling out -->
  <ellipse cx="100" cy="172" rx="3" ry="5" />
  <ellipse cx="100" cy="166" rx="2" ry="3" stroke-width="0.5" />
  <!-- Magnifying glass overlapping right side of funnel -->
  <circle cx="142" cy="106" r="22" />
  <circle cx="142" cy="106" r="18" stroke-width="0.6" />
  <!-- Glass reflection -->
  <path d="M 130 96 Q 134 92 140 92" stroke-width="0.6" />
  <!-- Handle -->
  <line x1="158" y1="122" x2="178" y2="142" stroke-width="3" />
  <line x1="156" y1="124" x2="176" y2="144" stroke-width="0.6" />
  <line x1="160" y1="120" x2="180" y2="140" stroke-width="0.6" />
  <!-- Handle grip stipple -->
  <circle cx="166" cy="128" r="0.6" fill="#1B1B17" stroke="none" />
  <circle cx="170" cy="132" r="0.6" fill="#1B1B17" stroke="none" />
  <circle cx="174" cy="136" r="0.6" fill="#1B1B17" stroke="none" />
  <!-- Stipple shading on funnel -->
  <circle cx="60" cy="72" r="0.5" fill="#1B1B17" stroke="none" />
  <circle cx="140" cy="72" r="0.5" fill="#1B1B17" stroke="none" />
</svg>
