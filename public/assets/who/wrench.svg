<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#1B1B17" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Wrench oriented diagonal, top-right to bottom-left -->
  <!-- Open jaw end (top-right) -->
  <path d="M 156 30 L 170 44 L 168 60 L 152 62 L 138 48 L 144 36 Z" />
  <!-- Inner jaw notch -->
  <path d="M 154 38 L 162 46 L 161 54 L 152 55 L 144 47 L 148 41 Z" stroke-width="0.6" />
  <!-- Shaft -->
  <line x1="148" y1="56" x2="56" y2="148" stroke-width="3" />
  <line x1="146" y1="58" x2="54" y2="150" stroke-width="0.6" />
  <line x1="150" y1="54" x2="58" y2="146" stroke-width="0.6" />
  <!-- Closed end (box wrench) bottom-left -->
  <circle cx="48" cy="156" r="14" />
  <circle cx="48" cy="156" r="9" />
  <!-- Hex pattern inside ring -->
  <polygon points="48,148 55,152 55,160 48,164 41,160 41,152" stroke-width="0.6" />
  <!-- Stipple -->
  <circle cx="100" cy="100" r="0.5" fill="#1B1B17" stroke="none" />
  <circle cx="120" cy="80" r="0.5" fill="#1B1B17" stroke="none" />
  <circle cx="80" cy="120" r="0.5" fill="#1B1B17" stroke="none" />
  <circle cx="160" cy="48" r="0.5" fill="#1B1B17" stroke="none" />
</svg>
